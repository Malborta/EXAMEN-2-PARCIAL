{% extends 'base.html' %}

{% block content %}

<div class="container">

    <div class="card shadow-lg p-5">

        <h1 class="mb-4">
            Editar Médico
        </h1>

        <form method="POST">

            <div class="mb-3">

                <label>Nombre</label>

                <input type="text"
                       name="nombre"
                       class="form-control"
                       value="{{ medico.nombre }}">

            </div>

            <div class="mb-3">

                <label>Especialidad</label>

                <input type="text"
                       name="especialidad"
                       class="form-control"
                       value="{{ medico.especialidad }}">

            </div>

            <button class="btn btn-warning">
                Actualizar
            </button>

        </form>

    </div>

</div>

{% endblock %}
